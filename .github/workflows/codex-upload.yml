name: Apply Codex production hardening
on:
  push:
    branches: [codex-production-hardening]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex-production-hardening
      - name: Payload part 1
        run: printf '%s' '' > /tmp/codex-upload.b64
      - name: Payload part 2
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 3
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 4
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 5
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 6
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 7
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 8
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 9
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Payload part 10
        run: printf '%s' '' >> /tmp/codex-upload.b64
      - name: Apply reviewed files
        run: |
          base64 -d /tmp/codex-upload.b64 > /tmp/codex-upload.zip
          unzip -oq /tmp/codex-upload.zip -d . || true
          rm -f -- 'tsconfig.app.tsbuildinfo'
          rm -f -- 'tsconfig.node.tsbuildinfo'
          rm -f .github/workflows/codex-upload.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply Codex production hardening and referral system'
          git push origin HEAD:codex-production-hardening
